name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install smoke-test dependencies
        run: python3 -m pip install -r requirements.txt
      - name: Run local smoke checks
        run: make sagi-operator-local-smoke
