name: Build member release

"on":
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. YYYY.MM.DD.N"
        required: true
      base_url:
        description: "Public base URL where DMG/ZIP/latest.json will be hosted"
        required: false
        default: ""
      release_notes:
        description: "Short release notes"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    env:
      VERSION: ${{ inputs.version }}
      BASE_URL: ${{ inputs.base_url }}
      RELEASE_NOTES: ${{ inputs.release_notes }}
      GH_TOKEN: ${{ github.token }}
      SAGI_MEMBERS_JSON_B64: ${{ secrets.SAGI_MEMBERS_JSON_B64 }}
      SAGI_SHEETS_BRIDGE_JSON_B64: ${{ secrets.SAGI_SHEETS_BRIDGE_JSON_B64 }}
      SAGI_OPERATOR_INSTAGRAM_PACKAGE_URL: ${{ secrets.SAGI_OPERATOR_INSTAGRAM_PACKAGE_URL }}
      SAGI_OPERATOR_CAPTURE_TOOLS_URL: ${{ secrets.SAGI_OPERATOR_CAPTURE_TOOLS_URL }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install smoke-test dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Prepare private release assets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SAGI_MEMBERS_JSON_B64"
          test -n "$SAGI_SHEETS_BRIDGE_JSON_B64"
          effective_base_url="${BASE_URL:-https://github.com/${GITHUB_REPOSITORY}/releases/latest/download}"
          export EFFECTIVE_BASE_URL="$effective_base_url"
          echo "EFFECTIVE_BASE_URL=$effective_base_url" >> "$GITHUB_ENV"
          mkdir -p config apks tools
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path("config/members.json").write_bytes(base64.b64decode(os.environ["SAGI_MEMBERS_JSON_B64"]))
          Path("config/sagi_sheets_bridge.json").write_bytes(base64.b64decode(os.environ["SAGI_SHEETS_BRIDGE_JSON_B64"]))
          PY
          if [[ -n "$SAGI_OPERATOR_INSTAGRAM_PACKAGE_URL" && -n "$SAGI_OPERATOR_CAPTURE_TOOLS_URL" ]]; then
            curl -fL "$SAGI_OPERATOR_INSTAGRAM_PACKAGE_URL" -o apks/Instagram.xapk
            curl -fL "$SAGI_OPERATOR_CAPTURE_TOOLS_URL" -o /tmp/sagi-capture-tools.tar.gz
            tar -xzf /tmp/sagi-capture-tools.tar.gz -C tools
          else
            echo "private asset URL secrets are missing; reusing assets from latest release DMG"
            previous_dmg="/tmp/sagi-operator-previous.dmg"
            mountpoint="/tmp/sagi-operator-previous"
            mkdir -p "$mountpoint"
            previous_dmg_url="$(gh release view --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[] | select(.name | endswith(".dmg")) | .url' | head -1)"
            test -n "$previous_dmg_url"
            curl -fL "$previous_dmg_url" -o "$previous_dmg"
            hdiutil attach "$previous_dmg" -nobrowse -readonly -mountpoint "$mountpoint"
            trap 'hdiutil detach "$mountpoint" >/dev/null 2>&1 || true' EXIT
            previous_src="$mountpoint/Unari Sagi Operator.app/Contents/Resources/unari-src"
            cp "$previous_src"/apks/* apks/
            cp "$previous_src"/tools/* tools/
            hdiutil detach "$mountpoint"
            trap - EXIT
          fi
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          base_url = os.environ["EFFECTIVE_BASE_URL"].rstrip("/")
          Path("config/sagi_operator_update.json").write_text(
              json.dumps(
                  {
                      "enabled": True,
                      "latest_url": f"{base_url}/latest.json",
                      "check_timeout_seconds": 8,
                  },
                  ensure_ascii=False,
                  indent=2,
              )
              + "\n",
              encoding="utf-8",
          )
          PY

      - name: Build app release package
        run: |
          args=(--version "$VERSION" --release-notes "$RELEASE_NOTES")
          args+=(--base-url "$EFFECTIVE_BASE_URL")
          python3 scripts/package_sagi_operator_release.py "${args[@]}"

      - name: Release smoke check
        run: python3 scripts/sagi_operator_release_check.py

      - name: Upload GitHub Release artifacts
        run: |
          gh release create "sagi-operator-$VERSION" \
            dist/sagi_operator_release/* \
            --title "Sagi Operator $VERSION" \
            --notes "$RELEASE_NOTES"

      - name: Verify published GitHub Release
        run: |
          published_latest_url="https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/latest.json"
          build="$(git rev-parse --short HEAD)"
          args=(
            --latest-url "$published_latest_url"
            --version "$VERSION"
            --build "$build"
            --base-url "$EFFECTIVE_BASE_URL"
            --retries 30
            --retry-delay 10
          )
          if [[ -z "$BASE_URL" ]]; then
            args+=(--check-assets --download-dmg)
          fi
          python3 scripts/verify_published_release.py "${args[@]}"

      - name: Write release summary
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          latest_path = Path("dist/sagi_operator_release/latest.json")
          data = json.loads(latest_path.read_text(encoding="utf-8"))
          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          assets = data.get("assets", {})

          lines = [
              "## Unari Sagi Operator member release",
              "",
              f"- Version: `{data.get('version', '')}`",
              f"- Build: `{data.get('build', '')}`",
              f"- Published at: `{data.get('published_at', '')}`",
              f"- Latest metadata: `{data.get('download_url', '').rsplit('/', 1)[0]}/latest.json`",
              "",
              "| Asset | File | URL | SHA256 | Size |",
              "| --- | --- | --- | --- | ---: |",
          ]

          for label in ("dmg", "zip"):
              item = assets.get(label, {})
              lines.append(
                  "| {label} | `{name}` | {url} | `{sha256}` | {size} |".format(
                      label=label.upper(),
                      name=item.get("name", ""),
                      url=item.get("url", ""),
                      sha256=item.get("sha256", ""),
                      size=item.get("size_bytes", ""),
                  )
              )

          lines.extend(
              [
                  "",
                  "> 公開配布の正はGitHub Releaseとlatest.jsonです。ローカルのdist/は作業用生成物で、自動では手元に戻りません。",
                  "",
                  "### latest.json",
                  "",
                  "```json",
                  json.dumps(data, ensure_ascii=False, indent=2),
                  "```",
              ]
          )
          Path(summary_path).write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
